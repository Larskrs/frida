<!DOCTYPE html>
<html>
<head>
    <title>Active row</title>
    <link rel="stylesheet" href="global.css">
    <style>

        body {
            font-family: system-ui, sans-serif;
            background: black;
            color: white;
            margin: 0;
            height: 100vh;
            width: 100%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .strip {
            max-height: 90px;
            min-height: 90px;
            height: 80px;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-between;
            gap: 24px;
            background: #000;
            border: 1px solid #333;
            border-bottom: none;
            margin-bottom: 16px ;
            padding: 6px 24px 12px 16px;
            position: relative;
        }

        .ip-container {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .ip-box {
            width: 80px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            background: #2a2a2a;
            font-weight: 700;
            transition: none;
        }
        .ip-box img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: none;
        }

        .tiny-id {
            font-size: 32px;
            opacity: 0.6;
            min-width: 30px;
            translate: 0 -2px;
        }

        /* Title */
        .title {
            flex: 1;
            font-size: 42px;
            margin-bottom: 4px;
            font-weight: 400;
            align-items: center;
            text-align: center;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            translate: 0 -1px;
        }

        /* Timing */
        .timing {
            font-size: 42px;
            font-weight: 600;
            text-align: right;
            color: var(--status-color);
            letter-spacing: 4px;
        }
        .offsetTime {
            font-size: 36px;
            font-weight: 600;
            text-align: center;
            color: var(--status-color);
            letter-spacing: 4px;
            padding-inline: 32px;
            translate: 0 -1px;
        }
        .notes {
            font-size: 24px;
            font-weight: 600;
            text-align: right;
            margin-left: 16px;
            color: #ccc;
        }

        .progress {
            position: absolute;
            height: 4px;
            background: var(--status-color);
            opacity: 0.75;
            left: 0;
            bottom: 0;
            right: 0;
            transition: width 250ms linear;
            z-index: 2;
        }
        .progressBG {
            position: absolute;
            height: 4px;
            background: #333333;
            opacity: 0.75;
            left: 0;
            bottom: 0;
            right: 0;
        }

        .row {
            display: flex;
            flex-direction: row;
            gap: 32px;
            align-items: center;
            justify-content: center;
        }

        .upcoming-container {
            display: table;
            border-collapse: collapse;
            flex-direction: column;
            gap: 6px;
            margin-top: 16px;
            background: #050505;
            border: 0px solid #222;
            overflow: hidden;
        }

        .upcoming-row {
            gap: 32px;
            align-items: center;
            border: 1px solid #333;
            background: #000;
            padding: 8px 24px 8px 16px;
            font-size: 32px;
            color: #ccc;
            min-height: 50px;
            height: 67px;
        }
        .upcoming-row:nth-child(even) {
            background: #0f0f0f;
        }

        .upcoming-row td {
            padding: 8px 16px;
            border-bottom: 1px solid var(--border);
            border-right: 1px solid var(--border);
        }

        .upcoming-ips {
            display: flex;
        }
        .upcoming-ips .ip-box {
            height: 36px;
            width: 42px;
        }

        .upcoming-page {
            color: var(--yellow);
        }

        .upcoming-title {
            flex: 1;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
        }

        .upcoming-time {
            font-weight: 600;
            letter-spacing: 2px;
            min-width: 120px;
            text-align: right;
        }

        .details {
            height: 406px;
            background: #000;
            width: 100%;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .evs {
            background: deeppink;
            color: white;
        }
        .k1, .k2, .k3, .k4, .k5  {
            background: #4c6fff;
            color: white;
        }
        .live {
            background: #4cff74;
        }

    </style>
</head>
<body>
<div class="strip">
    <div class="row">
        <div id="ipContainer" class="ip-container"></div>
        <div class="tiny-id" id="tinyId"></div>
        <div id="title" class="title">No Active row</div>
        <div id="notes" class="notes"></div>
    </div>
    <div class="row">
        <div id="offsetTime" class="offsetTime"></div>
        <div id="timing" class="timing">--:--</div>
    </div>
    <div id="progress" class="progress"></div>
    <div class="progressBG"></div>
</div>

<div id="upcomingContainer" class="upcoming-container"></div>

<div id="details" class="details">

</div>

<script type="module" src="display.js?v=1"></script>
</body>
</html>
