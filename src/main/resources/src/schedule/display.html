<!DOCTYPE html>
<html>
<head>
    <title>Active Column</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --panel: #111111;
            --border: #2a2a2a;
            --text: #e6e9ef;
            --muted: #8b93a1;
            --accent: #4c6fff;

            --green: #4cff74;
            --yellow: #ffd54a;
            --red: #ff4c4c;
        }
        body {
          font-family: system-ui, sans-serif;
          background: black;
          color: white;
          margin: 0;
          height: 100vh;
          display: flex;
          align-items: center;
          justify-content: center;
        }

        .strip {
          max-height: 100px;
            height: 80px;
          display: flex;
            flex-direction: row;
          align-items: center;
            justify-content: space-between;
          gap: 24px;
          background: #000;
          border: 1px solid #333;
          border-bottom: none;
          padding: 6px 16px 12px 16px;
          width: 100vw;
          position: relative;
        }

        .ip-container {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .ip-box {
            width: 80px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            background: #2a2a2a;
            font-weight: 700;
            transition: none;
        }
        .ip-box img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: none;
        }

        .tiny-id {
            font-size: 32px;
            opacity: 0.6;
            min-width: 30px;
            translate: 0 -2px;
        }

        /* Title */
        .title {
          flex: 1;
          font-size: 42px;
            margin-bottom: 4px;
          font-weight: 400;
            align-items: center;
            text-align: center;
          overflow: hidden;
          white-space: nowrap;
          text-overflow: ellipsis;
            translate: 0 -1px;
        }

        /* Timing */
        .timing {
          font-size: 42px;
          font-weight: 600;
          min-width: 120px;
          text-align: right;
          color: var(--status-color);
          letter-spacing: 4px;
        }
        .offsetTime {
            font-size: 36px;
            font-weight: 600;
            text-align: center;
            color: var(--status-color);
            letter-spacing: 4px;
            padding-inline: 32px;
            translate: 0 -1px;
        }
        .notes {
          font-size: 24px;
          font-weight: 600;
          min-width: 200px;
          text-align: right;
            margin-left: 16px;
          color: #ccc;
        }

        .progress {
          position: absolute;
          height: 4px;
          background: var(--status-color);
          opacity: 0.75;
          left: 0;
          bottom: 0;
          right: 0;
          transition: width 250ms linear;
            z-index: 2;
        }
        .progressBG {
          position: absolute;
          height: 4px;
          background: #333333;
          opacity: 0.75;
          left: 0;
          bottom: 0;
          right: 0;
        }

        .row {
            display: flex;
            flex-direction: row;
            gap: 32px;
            align-items: center;
            justify-content: center;
        }

        .evs {
            background: deeppink;
            color: white;
        }
        .k1, .k2, .k3, .k4, .k5  {
            background: #4c6fff;
            color: white;
        }
        .live {
            background: #4cff74;
        }

        .upcoming { --status-color: var(--yellow); }
        .late { --status-color: var(--red); }
        .ontime { --status-color: var(--green); }
        .early { --status-color: #fff44f; }
    </style>
</head>
<body>
<div class="strip">
    <div class="row">
        <div id="ipContainer" class="ip-container"></div>
        <div class="tiny-id" id="tinyId"></div>
        <div id="title" class="title">No Active Column</div>
        <div id="notes" class="notes"></div>
    </div>
    <div class="row">
        <div id="offsetTime" class="offsetTime"></div>
        <div id="timing" class="timing">--:--</div>
    </div>
    <div id="progress" class="progress"></div>
    <div class="progressBG"></div>
</div>



<script type="module" src="display.js?v=1"></script>
</body>
</html>
