<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Teleprompter</title>

    <style>
        * { box-sizing: border-box; }
        html, body { height: 100%; }

        body {
            margin: 0;
            background: #000;
            color: #fff;
            font-family: Arial, Helvetica, sans-serif;
            overflow: hidden;
        }

        .stage {
            position: absolute;
            inset: 0;
            padding: 40px 30px 80px 30px;
        }

        .track {
            will-change: transform;
            display: flex;
            flex-direction: column;
        }

        .row {
            margin: 0 auto 30px auto;
            max-width: 1100px;
            font-size: 100px;
            font-weight: 800;
            line-height: 1.25;
            word-break: break-word;
            white-space: normal;
            display: flex;
            flex-direction: column;
            margin-block: 50px;
            align-items: start;
            justify-content: start;
        }

        .page {
            background: #fff;
            color: #000;
            font-weight: 900;
            padding: 6px 14px;
            letter-spacing: 0.025em;
            text-transform: uppercase;
            width: 100%;
        }

        .script {
            background: #000;
            color: #fff;
            letter-spacing: 0.025em;
        }

        @media (max-width: 720px) {
            .page { font-size: 42px; }
            .script { font-size: 32px; }
        }
    </style>
</head>

<body>
<div class="stage">
    <div class="track" id="track"></div>
</div>

<script>
    /* ---------------- PARAMS ---------------- */

    const params = new URLSearchParams(location.search);
    const scheduleId = Number(params.get("id") || 1);

    /* ---------------- EVENTS ---------------- */

    const Events = {
        REQUEST_LOAD: "com.example.websocket.ScheduleEvent.RequestLoad",
        ROW_EDIT: "com.example.websocket.ScheduleEvent.RowEdited",
        CREATE_ROW: "com.example.websocket.ScheduleEvent.RowCreate",
        DELETE_ROW: "com.example.websocket.ScheduleEvent.RowDelete",
        ACTIVE_CHANGED: "com.example.websocket.ScheduleEvent.ActiveRowChanged"
    };

    /* ---------------- STATE ---------------- */

    const state = {
        ws: null,
        reconnectTimer: null,
        previousRows: new Map(), // rowId -> row
        activeRowId: null
    };

    /* ---------------- DOM ---------------- */

    const track = document.getElementById("track");

    /* ---------------- SCROLL CONFIG ---------------- */

    let speed = 0;
    let velocity = 0;
    let y = 0;
    let lastT = performance.now();

    /* ---------------- WS ---------------- */

    const WS_PATH = "/schedule/ws";
    const RECONNECT_DELAY = 1000;

    function getHost() {
        if (location.toString().includes("RELOAD_ON_SAVE")) return "localhost";
        return location.host;
    }

    function sendWs(payload) {
        if (state.ws?.readyState === WebSocket.OPEN) {
            state.ws.send(JSON.stringify(payload));
        }
    }

    function scheduleReconnect() {
        if (state.reconnectTimer) return;
        state.reconnectTimer = setTimeout(() => connectWs(scheduleId), RECONNECT_DELAY);
    }

    function connectWs(id) {
        const url = `ws://${getHost()}${WS_PATH}/${id}`;
        const ws = new WebSocket(url);
        state.ws = ws;

        ws.onopen = () => {
            if (state.reconnectTimer) clearTimeout(state.reconnectTimer);
            sendWs({ type: Events.REQUEST_LOAD, scheduleId: id });
        };

        ws.onmessage = e => {
            const event = safeJson(e.data);
            if (!event?.type) return;

            const type = event.type.split(".").pop();

            switch (type) {
                case "Load":
                    handleLoad(event.schedule);
                    break;

                case "RowEdited":
                    applyRowPatch(event);
                    break;

                case "RowCreate":
                    handleRowCreate(event.row);
                    break;

                case "RowDelete":
                    handleRowDelete(event.rowId);
                    break;

                case "ActiveRowChanged":
                    state.activeRowId = event.rowId;
                    break;
            }
        };

        ws.onclose = scheduleReconnect;
    }

    /* ---------------- WS HANDLERS ---------------- */

    function handleLoad(schedule) {
        state.previousRows.clear();

        (schedule.rows || []).forEach(r => {
            state.previousRows.set(r.id, r);
        });

        renderEntireSchedule();
    }

    function handleRowCreate(row) {
        state.previousRows.set(row.id, row);
        renderEntireSchedule(); // ordering may change
    }

    function handleRowDelete(rowId) {
        state.previousRows.delete(rowId);
        const el = track.querySelector(`[data-row-id="${rowId}"]`);
        if (el) el.remove();
    }

    function applyRowPatch(event) {
        const { rowId, key, value, cell } = event;
        if (!rowId) return;

        const row = state.previousRows.get(rowId);
        if (!row) return;

        if (!cell) {
            row[key] = value;
        } else {
            row.cells ??= {};
            row.cells[key] = cell;
        }

        state.previousRows.set(rowId, row);
        renderSpecificRow(rowId);
    }

    /* ---------------- RENDER ---------------- */

    function buildRowHtml(row) {
        const page = escapeHtml((row.page || "") + " - " + (row.title || ""));
        const script = escapeHtml(row.script ?? row.cells?.script?.value ?? "");

        return `
        <span class="page">${page}</span>
        <span class="script">${script}</span>
    `;
    }

    function renderEntireSchedule() {
        track.innerHTML = "";

        const rows = Array.from(state.previousRows.values())
            .sort((a, b) => (a.order ?? 0) - (b.order ?? 0));

        for (const row of rows) {
            const el = document.createElement("div");
            el.className = "row";
            el.dataset.rowId = row.id;
            el.innerHTML = buildRowHtml(row);
            track.appendChild(el);
        }
    }

    function renderSpecificRow(rowId) {
        const row = state.previousRows.get(rowId);
        if (!row) return;

        const existing = track.querySelector(`[data-row-id="${rowId}"]`);

        if (!existing) {
            // row didn't exist → full rerender safer
            renderEntireSchedule();
            return;
        }

        existing.innerHTML = buildRowHtml(row);
    }

    /* ---------------- SCROLL ---------------- */

    function clampScroll() {
        const stageH = window.innerHeight;
        const contentH = track.scrollHeight;

        const minY = Math.min(0, stageH - contentH - 40);
        const maxY = 0;

        if (y < minY) y = minY;
        if (y > maxY) y = maxY;
    }

    function applyTransform() {
        track.style.transform = `translate3d(0, ${y}px, 0)`;
    }

    function tick(now) {
        const dt = Math.min(0.5, (now - lastT) / 1000);
        lastT = now;

        const targetVelocity = -speed * 10;
        velocity += (targetVelocity - velocity) * (1 - Math.exp(-8 * dt));
        y += velocity * dt;

        clampScroll();
        applyTransform();

        requestAnimationFrame(tick);
    }

    /* ---------------- INPUT ---------------- */

    window.addEventListener("keydown", e => {
        if (e.code === "Space") {
            e.preventDefault();
            speed = 0;
            velocity = 0;
        }

        if (e.code === "ArrowUp" || e.code === "KeyS") {
            speed = Math.min(500, speed + 5);
        }

        if (e.code === "ArrowDown" || e.code === "KeyW") {
            speed = Math.max(-500, speed - 5);
        }
    });

    window.addEventListener("wheel", e => {
        speed += e.deltaY * -0.05;
        speed = Math.max(-500, Math.min(500, speed));
    }, { passive: true });

    /* ---------------- UTILS ---------------- */

    function safeJson(str) {
        try { return JSON.parse(str); }
        catch { return null; }
    }

    function escapeHtml(str) {
        return String(str)
            .replaceAll("&","&amp;")
            .replaceAll("<","&lt;")
            .replaceAll(">","&gt;")
            .replaceAll('"',"&quot;")
            .replaceAll("'","&#039;");
    }

    /* ---------------- BOOT ---------------- */

    connectWs(scheduleId);
    requestAnimationFrame(tick);

</script>
</body>
</html>
