<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="global.css">
    <meta charset="UTF-8" />
    <title>Schedule</title>
    <link rel="stylesheet" href="fonts.css">
    <link rel="stylesheet" href="view.css">
    <link rel="stylesheet" href="context-menu.css">
    <script src="./components/rundown-select.js"></script>
</head>

<body>

<div class="container">

    <div class="panel">
        <div class="header-name-row">
            <h1>Schedule</h1>
        </div>
        <h2>Current Active: <span id="active-row">None</span></h2>
    </div>

    <div class="panel">
        <label for="program-start-input">Program Start</label>
        <div class="controls">
            <input id="program-start-input" type="time" step="1" value="00:00:00" />
            <button id="program-start-set">Set Start</button>
            <button id="program-start-now">Start Now</button>
        </div>
        <label>RundownCreator</label>
        <div class="controls">
            <button id="rundown-reload">Reload From Rundown</button>
            <rundown-select id="select-rundown-load"></rundown-select>
        </div>
    </div>

    <div id="schedule-wrapper" class="panel table-wrapper">
        <table id="scheduleTable"></table>
    </div>

    <div id="window-no-shedule" class="message">
        <h1>No schedule is loaded</h1>
    </div>

    <div id="window-disconnected" class="message">
        <h1>Disconnected, try refreshing the page</h1>
    </div>

</div>

<script type="module" src="view.js?v=1"></script>
</body>
</html>
