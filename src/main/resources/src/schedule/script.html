<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Script Editor</title>

    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            background: #000;
            color: #fff;
            font-family: Arial, Helvetica, sans-serif;
        }

        .header {
            padding: 16px 20px;
            border-bottom: 1px solid #222;
            font-weight: 700;
            font-size: 20px;
        }

        .container {
            padding: 20px;
            max-width: 1200px;
            margin: auto;
        }

        .row {
            border: 1px solid #222;
            margin-bottom: 18px;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: #0b0b0b;
        }

        .title {
            font-size: 18px;
            font-weight: 800;
        }

        textarea {
            width: 100%;
            min-height: 120px;
            resize: vertical;
            background: #000;
            color: #fff;
            border: 1px solid #333;
            padding: 10px;
            font-size: 16px;
            font-family: monospace;
            outline: none;
        }

        textarea:focus {
            border-color: #fff;
        }

        .save-status {
            font-size: 12px;
            opacity: 0.7;
        }

        button {
            align-self: flex-end;
            background: #fff;
            color: #000;
            border: none;
            padding: 6px 12px;
            cursor: pointer;
            font-weight: 700;
        }
    </style>
</head>

<body>

<div class="header">Script Editor</div>
<div class="container" id="container"></div>

<script>
    /* ---------------- PARAMS ---------------- */

    const params = new URLSearchParams(location.search);
    const scheduleId = Number(params.get("id") || 1);

    /* ---------------- EVENTS ---------------- */

    const Events = {
        REQUEST_LOAD: "com.example.websocket.ScheduleEvent.RequestLoad",
        ROW_EDIT: "com.example.websocket.ScheduleEvent.RowEdited",
        CREATE_ROW: "com.example.websocket.ScheduleEvent.RowCreate",
        DELETE_ROW: "com.example.websocket.ScheduleEvent.RowDelete"
    };

    /* ---------------- STATE ---------------- */

    const state = {
        ws: null,
        reconnectTimer: null,
        rows: new Map(),
        saveTimers: new Map()
    };

    const container = document.getElementById("container");

    /* ---------------- WS ---------------- */

    const WS_PATH = "/schedule/ws";
    const RECONNECT_DELAY = 1000;

    function getHost() {
        if (location.toString().includes("RELOAD_ON_SAVE")) return "localhost";
        return location.host;
    }

    function sendWs(payload) {
        if (state.ws?.readyState === WebSocket.OPEN) {
            state.ws.send(JSON.stringify(payload));
        }
    }

    function scheduleReconnect() {
        if (state.reconnectTimer) return;
        state.reconnectTimer = setTimeout(() => connectWs(scheduleId), RECONNECT_DELAY);
    }

    function connectWs(id) {
        const ws = new WebSocket(`ws://${getHost()}${WS_PATH}/${id}`);
        state.ws = ws;

        ws.onopen = () => {
            if (state.reconnectTimer) clearTimeout(state.reconnectTimer);
            sendWs({ type: Events.REQUEST_LOAD, scheduleId: id });
        };

        ws.onmessage = e => {
            const event = safeJson(e.data);
            if (!event?.type) return;

            const type = event.type.split(".").pop();

            switch (type) {
                case "Load":
                    handleLoad(event.schedule);
                    break;
                case "RowEdited":
                    applyRowPatch(event);
                    break;
                case "RowCreate":
                    handleRowCreate(event.row);
                    break;
                case "RowDelete":
                    handleRowDelete(event.rowId);
                    break;
            }
        };

        ws.onclose = scheduleReconnect;
    }

    /* ---------------- WS HANDLERS ---------------- */

    function handleLoad(schedule) {
        state.rows.clear();
        container.innerHTML = "";

        (schedule.rows || []).forEach(row => {
            state.rows.set(row.id, row);
            renderRow(row);
        });

        scrollToHashRow();
    }

    function scrollToHashRow() {
        const hash = location.hash;
        if (!hash) return;

        const el = document.querySelector(hash);
        if (!el) return;

        // small delay so layout finishes
        setTimeout(() => {
            el.scrollIntoView({
                behavior: "smooth",
                block: "center"
            });
        }, 50);
    }

    function handleRowCreate(row) {
        state.rows.set(row.id, row);
        renderRow(row);
    }

    function handleRowDelete(rowId) {
        state.rows.delete(rowId);
        const el = container.querySelector(`[data-row-id="${rowId}"]`);
        if (el) el.remove();
    }

    function applyRowPatch(event) {
        const { rowId, key, value, cell } = event;
        const row = state.rows.get(rowId);
        if (!row) return;

        if (!cell) row[key] = value;
        else {
            row.cells ??= {};
            row.cells[key] = cell;
        }

        state.rows.set(rowId, row);
        updateRowTextarea(rowId);
    }

    /* ---------------- RENDER ---------------- */

    function renderRow(row) {
        const wrapper = document.createElement("div");
        wrapper.className = "row";
        wrapper.dataset.rowId = row.id;
        wrapper.id = `row-${row.id}`; // <-- anchor id

        const title = document.createElement("div");
        title.className = "title";
        title.textContent = `${row.page || ""} - ${row.title || ""}`;

        const textarea = document.createElement("textarea");
        textarea.value = getScript(row);

        const status = document.createElement("div");
        status.className = "save-status";
        status.textContent = "Idle";

        const btn = document.createElement("button");
        btn.textContent = "Save";

        function save() {
            status.textContent = "Saving...";
            sendWs({
                type: Events.ROW_EDIT,
                scheduleId,
                rowId: row.id,
                key: "script",
                value: textarea.value
            });
            status.textContent = "Saved";
        }

        // --------- DEBOUNCED AUTOSAVE ---------
        function scheduleAutoSave() {
            status.textContent = "Typing...";

            if (state.saveTimers.has(row.id)) {
                clearTimeout(state.saveTimers.get(row.id));
            }

            const t = setTimeout(() => {
                save();
                state.saveTimers.delete(row.id);
            }, 1000);

            state.saveTimers.set(row.id, t);
        }

        textarea.addEventListener("input", scheduleAutoSave);

        // Ctrl+Enter instant save
        textarea.addEventListener("keydown", e => {
            if (e.key === "Enter" && e.ctrlKey) {
                e.preventDefault();
                save();
            }
        });

        btn.onclick = save;

        wrapper.appendChild(title);
        wrapper.appendChild(textarea);
        wrapper.appendChild(btn);
        wrapper.appendChild(status);

        container.appendChild(wrapper);
    }


    function updateRowTextarea(rowId) {
        const row = state.rows.get(rowId);
        const el = container.querySelector(`[data-row-id="${rowId}"] textarea`);
        if (!el) return;
        el.value = getScript(row);
    }

    /* ---------------- HELPERS ---------------- */

    function getScript(row) {
        return row.script ?? row.cells?.script?.value ?? "";
    }

    function safeJson(str) {
        try { return JSON.parse(str); }
        catch { return null; }
    }

    /* ---------------- BOOT ---------------- */

    connectWs(scheduleId);
</script>
</body>
</html>
