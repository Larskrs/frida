<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Script Editor</title>

    <style>
        * { box-sizing: border-box; }

        body {
            margin: 0;
            background: #000;
            color: #fff;
            font-family: Arial, Helvetica, sans-serif;
        }

        .header {
            padding: 16px 20px;
            border-bottom: 1px solid #222;
            font-weight: 700;
            font-size: 20px;
        }

        .container {
            padding: 20px;
            max-width: 1200px;
            margin: auto;
        }

        .row {
            border: 1px solid #222;
            margin-bottom: 18px;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: #0b0b0b;
        }

        .title {
            font-size: 18px;
            font-weight: 800;
        }

        textarea {
            width: 100%;
            min-height: 120px;
            resize: vertical;
            background: #000;
            color: #fff;
            border: 1px solid #333;
            padding: 10px;
            font-size: 16px;
            font-family: monospace;
            outline: none;
        }

        textarea:focus {
            border-color: #fff;
        }

        .save-status {
            font-size: 12px;
            opacity: 0.7;
        }

        button {
            align-self: flex-end;
            background: #fff;
            color: #000;
            border: none;
            padding: 6px 12px;
            cursor: pointer;
            font-weight: 700;
        }
    </style>
</head>

<body>

<div class="header">Script Editor</div>
<div class="container" id="container"></div>
<script type="module" src="script.js?v=1"></script>
</body>
</html>
